name: Deploy Backend to EC2 (Docker Hub)

on:
  push:
    branches:
      - main
    paths:
      - backend/**
      - .github/workflows/deploy-ec2-dockerhub.yml
  workflow_dispatch:

concurrency:
  group: deploy-ec2-main
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Docker Hub credentials
        id: validate
        run: |
          set -euo pipefail

          if [ -z "${{ secrets.DOCKER_USERNAME }}" ]; then
            echo "DOCKER_USERNAME secret is missing"
            exit 1
          fi

          if [ -z "${{ secrets.DOCKER_PASSWORD }}" ]; then
            echo "DOCKER_PASSWORD secret is missing"
            exit 1
          fi

          echo "image_name=${{ secrets.DOCKER_USERNAME }}/job-tracker-api" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.validate.outputs.image_name }}:${{ github.sha }}
            ${{ steps.validate.outputs.image_name }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy on EC2 via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail

            APP_DIR="${{ secrets.EC2_APP_DIR }}"
            if [ -z "$APP_DIR" ]; then
              APP_DIR="/home/ubuntu/Job_Appliation_portal"
            fi

            cd "$APP_DIR/backend"

            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            export API_IMAGE="${{ secrets.DOCKER_USERNAME }}/job-tracker-api:${{ github.sha }}"

            docker compose -f docker-compose.yml -f docker-compose.ec2.yml pull api
            docker compose -f docker-compose.yml -f docker-compose.ec2.yml up -d --no-build

            docker compose -f docker-compose.yml -f docker-compose.ec2.yml ps
            curl -fsS http://localhost:8000/healthz

            docker image prune -f
