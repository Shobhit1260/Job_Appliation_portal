name: Deploy Backend to EC2 (Docker Hub)

on:
  push:
    branches:
      - main
    paths:
      - backend/**
      - .github/workflows/deploy-ec2-dockerhub.yml
  workflow_dispatch:

concurrency:
  group: deploy-ec2-main
  cancel-in-progress: true

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/job-tracker-api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Debug secrets
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ]; then echo "USERNAME EMPTY"; else echo "USERNAME OK"; fi
          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then echo "TOKEN EMPTY"; else echo "TOKEN OK"; fi  

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy on EC2 via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail

            APP_DIR="${{ secrets.EC2_APP_DIR }}"
            if [ -z "$APP_DIR" ]; then
              APP_DIR="/home/ubuntu/job_tracker"
            fi

            cd "$APP_DIR/backend"

            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            export API_IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/job-tracker-api:${{ github.sha }}"

            docker compose -f docker-compose.yml -f docker-compose.ec2.yml pull api
            docker compose -f docker-compose.yml -f docker-compose.ec2.yml up -d --no-build

            docker compose -f docker-compose.yml -f docker-compose.ec2.yml ps
            curl -fsS http://localhost:8000/healthz

            docker image prune -f
