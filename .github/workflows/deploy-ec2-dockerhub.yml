name: Deploy Backend to EC2 (Docker Hub)

on:
  push:
    branches:
      - main
    paths:
      - backend/**
      - .github/workflows/deploy-ec2-dockerhub.yml
  workflow_dispatch:

concurrency:
  group: deploy-ec2-main
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Docker Hub credentials
        id: validate
        run: |
          set -euo pipefail

          if [ -z "${{ secrets.DOCKER_USERNAME }}" ]; then
            echo "DOCKER_USERNAME secret is missing"
            exit 1
          fi

          if [ -z "${{ secrets.DOCKER_PASSWORD }}" ]; then
            echo "DOCKER_PASSWORD secret is missing"
            exit 1
          fi

          echo "image_name=${{ secrets.DOCKER_USERNAME }}/job-tracker-api" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.validate.outputs.image_name }}:${{ github.sha }}
            ${{ steps.validate.outputs.image_name }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    env:
      EC2_APP_DIR: ${{ secrets.EC2_APP_DIR != '' && secrets.EC2_APP_DIR || '/home/ubuntu/Job_Appliation_portal' }}
      APP_DOMAIN: ${{ secrets.APP_DOMAIN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure backend directory exists on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            mkdir -p "${{ env.EC2_APP_DIR }}/backend"

      - name: Deploy on EC2 via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail

            APP_DIR="${{ env.EC2_APP_DIR }}"
            APP_DOMAIN="${{ env.APP_DOMAIN }}"

            if [ -z "$APP_DOMAIN" ]; then
              echo "APP_DOMAIN secret is missing (example: api.example.com)"
              exit 1
            fi

            cd "$APP_DIR/backend"

            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            export API_IMAGE="${{ secrets.DOCKER_USERNAME }}/job-tracker-api:${{ github.sha }}"

            cat > docker-compose.ec2.yml <<'EOF'
            services:
              api:
                image: ${API_IMAGE:?API_IMAGE is required}
                pull_policy: always

              nginx:
                image: nginx:1.27-alpine
                container_name: jobtracker-nginx
                depends_on:
                  api:
                    condition: service_started
                ports:
                  - "80:80"
                volumes:
                  - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
            EOF

            cat > nginx.conf <<EOF
            server {
              listen 80;
              server_name ${APP_DOMAIN};

              location / {
                proxy_pass http://api:8000;
                proxy_http_version 1.1;
                proxy_set_header Host \$host;
                proxy_set_header X-Real-IP \$remote_addr;
                proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto \$scheme;
                proxy_set_header X-Forwarded-Host \$host;
              }
            }
            EOF

            test -f docker-compose.yml
            test -f docker-compose.ec2.yml
            test -f nginx.conf

            docker compose -f docker-compose.yml -f docker-compose.ec2.yml pull api nginx
            docker compose -f docker-compose.yml -f docker-compose.ec2.yml up -d --no-build

            docker compose -f docker-compose.yml -f docker-compose.ec2.yml ps

            # Wait for API via Nginx to be healthy (retry up to 30 times with 1s interval)
            HEALTHY=0
            for i in {1..30}; do
              if curl -fsS -H "Host: $APP_DOMAIN" http://localhost/healthz; then
                echo "API is healthy via Nginx"
                HEALTHY=1
                break
              fi
              if [ $i -lt 30 ]; then
                echo "API not ready, retrying... ($i/30)"
                sleep 1
              fi
            done

            if [ "$HEALTHY" -ne 1 ]; then
              echo "API health check failed after retries"
              docker compose -f docker-compose.yml -f docker-compose.ec2.yml logs --tail=100 api nginx
              exit 1
            fi

            docker image prune -f
